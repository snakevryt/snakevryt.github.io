<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div id="loginPage" class="page">
    <h1>Login with Meta Account</h1>
    <input type="text" id="metaUsername" placeholder="Enter your Meta Quest username" required>
    <button id="loginButton">Login</button>
    <p id="errorMessage" style="color: red; display: none;"></p> <!-- Error message -->
</div>


    <div id="mainPage" class="page" style="display: none;">
        <div id="userInfo">
            <p id="metaAccountInfo"></p>
        </div>
        <div id="appList">
            <h2>Uploaded Apps</h2>
            <ul id="appListContainer"></ul>
        </div>
        <div id="createApp">
            <h2>Create New App</h2>
            <input type="text" id="appName" placeholder="App Name" required>
            <input type="text" id="appImage" placeholder="Image URL" required>
            <input type="text" id="appFileSize" placeholder="File Size (MB)" required>
            <button id="createAppButton">Create App</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
